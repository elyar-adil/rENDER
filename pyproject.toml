[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
norecursedirs = ["third_party", "lib", ".git", "__pycache__"]

[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
    ".cache",
    "tests/fixtures/webkit/upstream_raw",
    "third_party",
    "lib",
]

[tool.ruff.lint]
select = ["F"]
